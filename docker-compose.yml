services:
  postgres:
    image: postgres:16-alpine
    container_name: the-huddle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: huddle
      POSTGRES_PASSWORD: huddle_dev
      POSTGRES_DB: huddle
    ports:
      - "5433:5432"
    volumes:
      - the-huddle-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huddle -d huddle"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: the-huddle-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull phi3
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q phi3"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 300s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: the-huddle-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      APP_ENV: local
      OLLAMA_API_BASE: http://ollama:11434
      LLM_LOCAL_MODEL: ollama/phi3
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # --- NEW FRONTEND SERVICE ---
  frontend:
    build:
      context: ./frontend
      # Assuming you have a Dockerfile in your frontend folder. 
      # If not, let me know and we can run it directly using a node image!
      dockerfile: Dockerfile 
    container_name: the-huddle-frontend
    restart: unless-stopped
    ports:
      - "5173:5173" # Vite's default port. Change if your app uses 3000
    volumes:
      # This syncs your local code into the container for hot-reloading!
      - ./frontend:/app 
      # This prevents your host machine from overriding the container's installed packages
      - /app/node_modules 
    environment:
      # Tells your Vite app where to find the local backend
      - VITE_API_URL=http://localhost:8000 
    depends_on:
      - api

volumes:
  the-huddle-pgdata:
  ollama-data:
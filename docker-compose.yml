services:
  postgres:
    image: postgres:16-alpine
    container_name: the-huddle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: huddle
      POSTGRES_PASSWORD: huddle_dev
      POSTGRES_DB: huddle
    ports:
      - "5433:5432"
    volumes:
      - the-huddle-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huddle -d huddle"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: the-huddle-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      # Keep one small model loaded; phi3 often OOMs in Docker on laptops
      OLLAMA_KEEP_ALIVE: "30m"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull llama3.2:1b
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'llama3.2:1b'"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 180s

  minio:
    image: minio/minio:latest
    container_name: the-huddle-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: the-huddle-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      S3_BUCKET: huddle-uploads
    volumes:
      - ./docker/minio-init.sh:/init/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/init/minio-init.sh"]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: the-huddle-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      APP_ENV: local
      OLLAMA_API_BASE: http://ollama:11434
      LLM_LOCAL_MODEL: ollama/llama3.2:1b
      LLM_MAX_TOKENS: "384"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: huddle-uploads
      S3_PUBLIC_BASE_URL: http://localhost:9000/huddle-uploads
      S3_USE_PATH_STYLE: "true"
      S3_REGION: us-east-1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # --- NEW FRONTEND SERVICE ---
  frontend:
    build:
      context: ./frontend
      # Assuming you have a Dockerfile in your frontend folder. 
      # If not, let me know and we can run it directly using a node image!
      dockerfile: Dockerfile 
    container_name: the-huddle-frontend
    restart: unless-stopped
    ports:
      - "5173:5173" # Vite's default port. Change if your app uses 3000
    volumes:
      # This syncs your local code into the container for hot-reloading!
      - ./frontend:/app 
      # This prevents your host machine from overriding the container's installed packages
      - /app/node_modules 
    environment:
      # Tells your Vite app where to find the local backend
      - VITE_API_URL=http://localhost:8000 
    depends_on:
      - api

volumes:
  the-huddle-pgdata:
  ollama-data:
  minio-data: